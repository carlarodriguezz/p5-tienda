<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda Online - Contacto</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="contenedor">
      <h1>Tienda Online</h1>
      <nav>
        <ul class="menu">
          <li><a href="index.html">Inicio</a></li>
          <li><a href="productos.html">Productos</a></li>
          <li><a href="carrito.html">Carrito</a></li>
          <li><a href="contacto.html" class="activo">Contacto</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="contenedor">
    <section>
      <h2>Formulario de contacto</h2>
      <p>
        Si deseas más información sobre nuestros productos o sobre tu pedido,
        rellena el siguiente formulario.
      </p>

      <form action="#" method="post" class="formulario">
        <div class="campo">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" placeholder="Escribe tu nombre" required>
        </div>

        <div class="campo">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
        </div>

        <div class="campo">
          <label for="telefono">Teléfono</label>
          <input type="tel" id="telefono" name="telefono" placeholder="600123123">
        </div>

        <div class="campo">
          <label for="asunto">Asunto</label>
          <select id="asunto" name="asunto">
            <option value="consulta">Consulta</option>
            <option value="pedido">Pedido</option>
            <option value="incidencia">Incidencia</option>
          </select>
        </div>

        <div class="campo">
          <label for="mensaje">Mensaje</label>
          <textarea id="mensaje" name="mensaje" rows="6" placeholder="Escribe aquí tu mensaje" required></textarea>
        </div>

        <div class="campo-check">
          <input type="checkbox" id="privacidad" name="privacidad" required>
          <label for="privacidad">Acepto la política de privacidad</label>
        </div>

        <button type="submit" class="boton">Enviar formulario</button>
      </form>
    </section>
  </main>

  <footer>
    <div class="contenedor">
      <p>&copy; 2026 Tienda Online - Práctica 4</p>
    </div>
  </footer>
</body>
</html>
